<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Let's create your first presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---------- Tokens ---------- */
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #fafafa;
    --bg-elevated: #ffffff;
    --bg-secondary-inverted: #171717;
    --text-primary: #171717;
    --text-secondary: #525252;
    --text-tertiary: #a3a3a3;
    --text-white: #ffffff;
    --border-primary: rgba(26, 26, 26, 0.2);
    --border-subtle: rgba(26, 26, 26, 0.1);
    --border-brand: #171717;
    --border-brand-secondary: rgba(26, 26, 26, 0.15);
    --shadow-drop-1: rgba(26, 26, 26, 0.03);
    --shadow-drop-2: rgba(26, 26, 26, 0.06);
    --shadow-inner-1: rgba(255, 255, 255, 0.8);
  }

  /* ---------- Reset / base ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Page structure ---------- */
  .page {
    width: 1280px;
    margin: 0 auto;
    background: var(--bg-primary);
  }
  .main-screen {
    position: relative;
    width: 1280px;
    height: 720px;
    background: var(--bg-primary);
  }

  /* ---------- Top bar ---------- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 80px;
    background: var(--bg-primary);
    width: 1280px;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 99px;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1px var(--shadow-drop-2),
      0 1px 2px 1px var(--shadow-drop-1),
      inset 0 0 0 1px var(--shadow-inner-1);
  }
  .icon-btn svg { width: 20px; height: 20px; color: #171717; }

  /* ---------- Heading ---------- */
  .heading-block {
    position: absolute;
    left: 340px; top: 64px; width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .heading {
    font-size: 32px;
    line-height: 1.15;
    letter-spacing: -0.24px;
    font-weight: 400;
    color: var(--text-primary);
    text-align: center;
    white-space: pre-wrap;
  }
  .heading .muted { color: #7a7a7a; }

  /* ---------- Sample prompts (label + ticker) ---------- */
  .examples {
    position: absolute;
    left: 340px; top: 220px; width: 600px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: flex-start;
  }
  .sample-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .sample-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .sample-label::before,
  .sample-label::after {
    content: '';
    flex: 1;
    height: 1px;
  }
  .sample-label::before {
    background: linear-gradient(to right, transparent, rgba(26, 26, 26, 0.15));
  }
  .sample-label::after {
    background: linear-gradient(to left, transparent, rgba(26, 26, 26, 0.15));
  }
  .ticker {
    width: 100%;
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
  }
  .ticker-track {
    display: inline-flex;
    gap: 8px;
    width: max-content;
    animation: ticker-ltr 70s linear infinite;
  }
  .ticker:hover .ticker-track { animation-play-state: paused; }
  @keyframes ticker-ltr {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .pill:hover {
    border-color: rgba(26, 26, 26, 0.3);
    box-shadow: 0 1px 2px 0 rgba(26, 26, 26, 0.05);
  }
  .pill-emoji { font-size: 15px; line-height: 1; }

  /* ---------- Prompt box ---------- */
  .prompt-area {
    position: absolute;
    left: 340px; top: 308px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .prompt {
    position: relative;
    width: 600px;
    height: 240px;
    border-radius: 16px;
    background: var(--bg-elevated);
    padding: 10px;
    box-shadow:
      0 0 0 0.75px var(--border-brand),
      0 0 0 2px var(--border-brand-secondary),
      0 0 0 1px var(--shadow-drop-2),
      0 1px 2px 0 var(--shadow-drop-2),
      0 4px 6px 0 var(--shadow-drop-2),
      0 24px 40px -16px var(--shadow-drop-2),
      inset 0 0 0 1px var(--shadow-inner-1);
  }
  .prompt-inner {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg-secondary);
    border: 1.5px dashed rgba(26, 26, 26, 0.2);
    border-radius: 12px;
    padding: 12px;
    overflow: hidden;
  }
  .prompt-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .prompt-input {
    display: block;
    width: 100%;
    min-height: 60px;
    padding: 0;
    margin: 0;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 20px;
    line-height: 1.5;
    color: var(--text-primary);
  }
  .prompt-input::placeholder {
    color: transparent;
  }

  /* Custom two-line hint with icons */
  .custom-placeholder {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    pointer-events: none;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    font-size: 20px;
    line-height: 1.5;
    color: var(--text-tertiary);
    transition: opacity 0.2s ease;
  }
  .placeholder-line {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .placeholder-line svg { flex-shrink: 0; }
  .prompt-inner:has(.prompt-input:not(:placeholder-shown)) .custom-placeholder {
    opacity: 0;
  }
  .prompt-drop-hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    padding: 0 14px;
    border-radius: 8px;
    background: #ffffff;
    border: 1.5px dashed rgba(26, 26, 26, 0.2);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.43;
    color: var(--text-primary);
    cursor: pointer;
    transition: border-color .15s;
  }
  .prompt-drop-hint:hover {
    border-color: rgba(26, 26, 26, 0.35);
  }
  .upload-arrow {
    animation: upload-arrow-bounce 1.4s ease-in-out infinite;
  }
  .upload-bracket {
    animation: upload-bracket-bounce 1.4s ease-in-out infinite;
  }
  @keyframes upload-arrow-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }
  @keyframes upload-bracket-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(0.6px); }
  }
  .cta-arrow {
    animation: cta-arrow-nudge 1.4s ease-in-out infinite;
  }
  @keyframes cta-arrow-nudge {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(3px); }
  }

  /* ---------- Toolbar ---------- */
  .bottom-toolbar {
    position: absolute;
    bottom: 12px;
    left: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .bottom-toolbar-right {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    padding: 0 14px;
    border-radius: 8px;
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.43;
    border: none;
    white-space: nowrap;
    cursor: pointer;
    box-shadow:
      0 0 0 1px var(--shadow-drop-2),
      0 1px 2px 1px var(--shadow-drop-1),
      inset 0 0 0 1px var(--shadow-inner-1);
  }
  .btn svg { width: 13px; height: 13px; }
  .btn .leading-icon { display: inline-flex; align-items: center; padding-right: 6px; }
  .btn .trailing-icon { display: inline-flex; align-items: center; padding-left: 6px; }
  .btn-icon-only {
    width: 36px;
    padding: 0;
  }
  .btn-continue {
    background: var(--bg-secondary-inverted);
    color: var(--text-white);
    box-shadow:
      0 0 0 1px var(--shadow-drop-1),
      0 1px 2px 0 var(--shadow-drop-2);
  }
  .btn-continue.btn-icon-only { width: 72px; }
  .btn-continue.btn-icon-only svg { width: 20px; height: 20px; }
  .btn-continue .trailing-icon svg { width: 18px; height: 18px; }

  /* Arrow button visible only when the prompt has content */
  .prompt-area > .btn-continue {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .prompt-area:has(.prompt-input:not(:placeholder-shown)) > .btn-continue {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---------- Iteration divider ---------- */
  .iterations {
    border-top: 1px solid var(--border-subtle);
  }

  /* ---------- Iteration 3: toolbar above, chips inside ---------- */
  .toolbar-above {
    position: absolute;
    left: 340px;
    top: 190px;
    width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .toolbar-above .toolbar-left,
  .toolbar-above .toolbar-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ticker-bottom {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    width: auto;
  }

  /* ---------- Intro sequence (main screen only) ----------
     Staggered, overlapping fades. Each step starts before the previous
     one finishes, with a slow ease-out so each fade feels graceful. */
  .anim-intro {
    opacity: 0;
    display: inline-block;
    transform: translateY(40px);
    animation: intro-show-hide 8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .anim-action {
    opacity: 0;
    display: inline-block;
    transform: translateY(40px);
    animation: fade-up 1.5s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
  }
  .anim-rest {
    opacity: 0;
    transform: translateY(40px);
    animation: fade-up 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
  }
  .anim-rest-2 {
    opacity: 0;
    transform: translateY(40px);
    animation: fade-up 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes intro-show-hide {
    0%   { opacity: 0; transform: translateY(40px); }  /* 0s   — start below */
    19%  { opacity: 1; transform: translateY(0); }     /* 1.5s — in place */
    50%  { opacity: 1; transform: translateY(0); }     /* 4s   — still visible */
    100% { opacity: 0; transform: translateY(0); }     /* 8s   — fade out, no drift */
  }
</style>
</head>
<body>
  <div class="page">

    <!-- =============== MAIN SCREEN (toolbar above, chips inside) =============== -->
    <div class="main-screen iteration-3-screen">

        <!-- Top bar -->
        <div class="top-bar">
          <button class="icon-btn" aria-label="Back">
            <svg viewBox="0 0 20 20" fill="none"><path d="M12.5 4.375L6.875 10L12.5 15.625" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn" aria-label="Close">
            <svg viewBox="0 0 20 20" fill="none"><path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- Heading -->
        <div class="heading-block">
          <p class="heading"><span class="muted anim-intro">Let's create your first presentation</span><br><span class="anim-action">Describe your deck, or upload a file</span></p>
        </div>

        <!-- Toolbar above the prompt box -->
        <div class="toolbar-above anim-rest">
          <div class="toolbar-left">
            <button type="button" class="btn">
              <span class="leading-icon">
                <svg viewBox="0 0 16 16" fill="none">
                  <g class="upload-bracket">
                    <path d="M3 10V12C3 12.5523 3.44772 13 4 13H12C12.5523 13 13 12.5523 13 12V10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </g>
                  <g class="upload-arrow">
                    <path d="M8 10V3M8 3L5 6M8 3L11 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </g>
                </svg>
              </span>
              <span>Upload Files</span>
              <span class="trailing-icon">
                <svg viewBox="0 0 13 13" fill="none"><path d="M3.25 4.875L6.5 8.125L9.75 4.875" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
            </button>
          </div>
          <div class="toolbar-right">
            <button class="btn">
              <span class="leading-icon">
                <svg viewBox="0 0 14 14" fill="none">
                  <path d="M7 1.5L1.75 4L7 6.5L12.25 4L7 1.5Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
                  <path d="M1.75 7L7 9.5L12.25 7" stroke="currentColor" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
                  <path d="M1.75 10L7 12.5L12.25 10" stroke="currentColor" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Slide Count</span>
              <span class="trailing-icon">
                <svg viewBox="0 0 13 13" fill="none"><path d="M3.25 4.875L6.5 8.125L9.75 4.875" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
            </button>
            <button class="btn">
              <span class="leading-icon">
                <svg viewBox="0 0 14 14" fill="none">
                  <path d="M7 2.5C5.6 2.5 4.5 3.5 4.5 4.8C3.6 5 3 5.8 3 6.7C3 7.5 3.5 8.2 4.2 8.4V9.5C4.2 10.3 4.9 11 5.7 11H8.3C9.1 11 9.8 10.3 9.8 9.5V8.4C10.5 8.2 11 7.5 11 6.7C11 5.8 10.4 5 9.5 4.8C9.5 3.5 8.4 2.5 7 2.5Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
                  <path d="M7 2.8V11" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                </svg>
              </span>
              <span>AI Model</span>
              <span class="trailing-icon">
                <svg viewBox="0 0 13 13" fill="none"><path d="M3.25 4.875L6.5 8.125L9.75 4.875" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
            </button>
            <button class="btn btn-icon-only" aria-label="Settings">
              <svg viewBox="0 0 14 14" fill="none" width="13" height="13">
                <line x1="2" y1="3.5" x2="12" y2="3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="2" y1="10.5" x2="12" y2="10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="9" cy="3.5" r="1.6" stroke="currentColor" stroke-width="1.2" fill="#fff"/>
                <circle cx="5" cy="10.5" r="1.6" stroke="currentColor" stroke-width="1.2" fill="#fff"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Prompt with chips ticker inside at the bottom -->
        <div class="prompt-area anim-rest-2" style="top: 246px;">
          <div class="prompt">
            <div class="prompt-inner">

              <div class="custom-placeholder">
                <div class="placeholder-line">
                  <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
                    <path d="M13 3l4 4-10 10H3v-4l10-10z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span>Type here or</span>
                </div>
                <div class="placeholder-line">
                  <svg viewBox="0 0 20 20" fill="none" width="20" height="20">
                    <g class="upload-bracket">
                      <path d="M4 13v2.5C4 16.3 4.7 17 5.5 17h9c0.8 0 1.5-0.7 1.5-1.5V13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                    <g class="upload-arrow">
                      <path d="M10 13V3M10 3L6.5 6.5M10 3L13.5 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                  </svg>
                  <span>drop in a file</span>
                </div>
              </div>
              <textarea class="prompt-input" placeholder=" " rows="2" autofocus></textarea>

              <div class="ticker ticker-bottom">
                <div class="ticker-track">
                  <button class="pill"><span class="pill-emoji">💼</span>Marketing Performance Review</button>
                  <button class="pill"><span class="pill-emoji">🧩</span>Board Marketing Update</button>
                  <button class="pill"><span class="pill-emoji">🗓️</span>Annual Marketing Strategy</button>
                  <button class="pill" aria-hidden="true"><span class="pill-emoji">💼</span>Marketing Performance Review</button>
                  <button class="pill" aria-hidden="true"><span class="pill-emoji">🧩</span>Board Marketing Update</button>
                  <button class="pill" aria-hidden="true"><span class="pill-emoji">🗓️</span>Annual Marketing Strategy</button>
                </div>
              </div>

            </div>
          </div>

          <!-- Submit button centered below the box -->
          <button class="btn btn-continue">
            <span>Create Presentation</span>
            <span class="trailing-icon">
              <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                <g class="cta-arrow">
                  <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
              </svg>
            </span>
          </button>
        </div>

    </div>

  </div>
</body>
</html>
